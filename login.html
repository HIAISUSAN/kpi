<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 · KPI 宇宙遊戲樂園</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  .login-wrap {
    position: relative; z-index: 2;
    max-width: 460px; margin: 80px auto; padding: 0 20px;
  }
  .login-title {
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    font-weight: 800;
    font-size: 28px;
    margin-bottom: 6px;
    color: var(--gold);
  }
  .login-sub { text-align: center; color: var(--text-dim); margin-bottom: 24px; }
  .ship-pick {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(0,0,0,0.3);
    border: 2px solid rgba(168,85,247,0.4);
    border-radius: 12px;
    padding: 8px 12px;
  }
  .ship-pick-img {
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(255,255,255,0.1);
    background-size: cover; background-position: center;
    flex-shrink: 0;
    border: 2px solid rgba(168,85,247,0.5);
  }
  .ship-pick select {
    border: none !important;
    background: transparent !important;
    padding: 0 !important;
  }
  .ship-pick select:focus { box-shadow: none !important; }
  .err-msg { color: #fca5a5; font-size: 13px; margin-top: 10px; text-align: center; }
  .cb-remember { display: flex; align-items: center; gap: 8px; margin: 14px 0; font-size: 14px; color: var(--text-dim); }
</style>
</head>
<body>
<div class="starfield"></div>

<nav class="topbar">
  <a class="logo" href="index.html">🌌 KPI 宇宙</a>
  <a class="btn btn-secondary" href="register.html" style="padding:8px 18px;font-size:14px;">加入</a>
</nav>

<div class="login-wrap">
  <div class="card">
    <div class="login-title">👤 登入</div>
    <div class="login-sub">輸入註冊時的 Email 和密碼</div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="emailInput" placeholder="your@email.com" autocomplete="email" autofocus>
    </div>

    <div class="field">
      <label>密碼</label>
      <input type="password" id="pwd" placeholder="輸入你的密碼" autocomplete="current-password">
    </div>

    <label class="cb-remember">
      <input type="checkbox" id="remember" checked>
      <span>記住我 90 天（手機上記得勾這個 📱）</span>
    </label>

    <button class="btn btn-primary" id="loginBtn" style="width:100%;">🚀 進入駕駛艙</button>
    <div class="err-msg" id="err" style="display:none;"></div>

    <div style="text-align:center; margin-top:16px; font-size:13px; color: var(--text-dim);">
      還沒加入？ <a href="register.html" style="color:var(--gold);">建立太空船 →</a><br>
      <a href="#" id="forgotLink" style="color:var(--gold); display:inline-block; margin-top:6px;">🔑 忘記密碼？寄到我信箱</a>
    </div>
  </div>

</div>

<!-- 🔑 找回帳號密碼 Modal -->
<div id="forgotModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; backdrop-filter:blur(10px);">
  <div class="card" style="width:90%; max-width:440px; padding:32px;">
    <div style="text-align:center; font-size:48px; margin-bottom:6px;">🔑</div>
    <div style="text-align:center; font-family:'Orbitron',sans-serif; font-weight:800; font-size:22px; color:var(--gold); margin-bottom:6px;">找回我的帳號</div>
    <div style="text-align:center; color:var(--text-dim); font-size:13px; margin-bottom:18px;">輸入你註冊時的 Email，<br>系統會把暱稱 + 密碼寄到那個信箱</div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="forgotEmail" placeholder="your@email.com" autocomplete="email">
    </div>
    <div id="forgotErr" style="color:#fca5a5; font-size:13px; margin-bottom:10px; display:none;"></div>
    <div id="forgotOk" style="color:var(--green); font-size:14px; margin-bottom:10px; display:none; background:rgba(52,211,153,0.12); border:1px solid var(--green); border-radius:10px; padding:10px;"></div>
    <div style="display:flex; gap:10px;">
      <button class="btn btn-secondary" id="forgotCancel" style="flex:0 0 auto; padding:10px 18px;">關閉</button>
      <button class="btn btn-primary" id="forgotSubmit" style="flex:1;">📧 寄送</button>
    </div>
  </div>
</div>

<script src="assets/data.js"></script>
<script src="assets/stars.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
(async () => {
  try { await KPI.init(); } catch (e) { console.error('載入失敗', e); }

  // 如果已登入，直接跳轉
  if (KPI.currentUser()) {
    window.location.href = 'game.html';
    return;
  }

  const emailEl = document.getElementById('emailInput');
  const pwdEl = document.getElementById('pwd');

  async function tryLogin() {
    const err = document.getElementById('err');
    err.style.display = 'none';
    const email = emailEl.value.trim();
    const pwd = pwdEl.value;
    if (!email) { err.textContent = '請輸入 Email'; err.style.display = 'block'; return; }
    if (!pwd) { err.textContent = '請輸入密碼'; err.style.display = 'block'; return; }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = '⏳ 登入中...';
    try {
      await KPI.login(email, pwd);
      window.location.href = 'game.html';
    } catch (e) {
      err.textContent = e.message;
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = '🚀 進入駕駛艙';
    }
  }
  document.getElementById('loginBtn').onclick = tryLogin;
  emailEl.addEventListener('keypress', e => { if (e.key === 'Enter') pwdEl.focus(); });
  pwdEl.addEventListener('keypress', e => { if (e.key === 'Enter') tryLogin(); });

  // ===== 🔑 忘記密碼（EmailJS 寄信）=====
  emailjs.init('p1K9QW09Lylxpkj42');
  const SERVICE_ID = 'service_8dwl0h4';
  const TEMPLATE_ID = 'template_8zazw9h';

  const forgotModal = document.getElementById('forgotModal');
  const forgotEmail = document.getElementById('forgotEmail');
  const forgotErr = document.getElementById('forgotErr');
  const forgotOk = document.getElementById('forgotOk');

  document.getElementById('forgotLink').onclick = (e) => {
    e.preventDefault();
    forgotEmail.value = emailEl.value || '';
    forgotErr.style.display = 'none';
    forgotOk.style.display = 'none';
    forgotModal.style.display = 'flex';
    setTimeout(() => forgotEmail.focus(), 100);
  };
  document.getElementById('forgotCancel').onclick = () => { forgotModal.style.display = 'none'; };
  forgotModal.addEventListener('click', e => { if (e.target === forgotModal) forgotModal.style.display = 'none'; });

  async function submitForgot() {
    forgotErr.style.display = 'none';
    forgotOk.style.display = 'none';
    const targetEmail = forgotEmail.value.trim().toLowerCase();
    if (!targetEmail || !/^\S+@\S+\.\S+$/.test(targetEmail)) {
      forgotErr.textContent = '請輸入有效的 Email'; forgotErr.style.display = 'block'; return;
    }
    const btn = document.getElementById('forgotSubmit');
    btn.disabled = true; btn.textContent = '⏳ 寄送中...';
    try {
      // 找 user
      const user = KPI.listUsers().find(u => (u.email || '').trim().toLowerCase() === targetEmail);
      if (!user) {
        // 為安全：不告知是否存在，一律顯示「已寄出」
        forgotOk.textContent = '✅ 若這個 Email 有註冊，帳號資訊已寄出。請檢查信箱（含垃圾信件夾）。';
        forgotOk.style.display = 'block';
        return;
      }
      await emailjs.send(SERVICE_ID, TEMPLATE_ID, {
        to_name: user.name,
        to_email: targetEmail,
        email: targetEmail,
        user_email: targetEmail,
        name: user.name,
        password: user.password,
      });
      forgotOk.textContent = '✅ 已寄出！請檢查信箱（含垃圾信件夾），1 分鐘內應該收到。';
      forgotOk.style.display = 'block';
    } catch (err) {
      console.error(err);
      forgotErr.textContent = '寄送失敗：' + (err.text || err.message || '請稍後再試');
      forgotErr.style.display = 'block';
    } finally {
      btn.disabled = false; btn.textContent = '📧 寄送';
    }
  }
  document.getElementById('forgotSubmit').onclick = submitForgot;
  forgotEmail.addEventListener('keypress', e => { if (e.key === 'Enter') submitForgot(); });
})();
</script>
</body>
</html>
